name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Restore
        run: dotnet restore DataverseFakes.sln

      - name: Build
        run: dotnet build DataverseFakes.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DataverseFakes.Tests\DataverseFakes.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: nuget pack DataverseFakes.nuspec -OutputDirectory nupkg

      - name: Push to NuGet
        run: dotnet nuget push nupkg\*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nupkg/*.nupkg
          generate_release_notes: true
